<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scadenziere</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Scadenziere" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── Token di design ── */
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #4f8ef7;
      --accent-hover: #3a7ae0;
      --danger:    #e05c5c;
      --text:      #e8eaf0;
      --text-muted:#7a7f99;
      --radius:    10px;
      --font:      'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Card login ── */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .login-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    /* ── Campi ── */
    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    /* ── Bottone ── */
    button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.4rem;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Messaggio errore ── */
    .msg {
      display: none;
      margin-top: 1rem;
      padding: 0.7rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      text-align: center;
    }

    .msg.errore {
      display: block;
      background: rgba(224, 92, 92, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .msg.info {
      display: block;
      background: rgba(79, 142, 247, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <h1>Scadenziere</h1>
      <p>Accedi con le tue credenziali</p>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="nome@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button type="submit" id="btn-login">Accedi</button>

    <div class="msg" id="messaggio"></div>
  </div>

  <script>
    // ── Configurazione Supabase ──
    const SUPABASE_URL  = 'https://wmjncvwjocmdfftughtz.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indtam5jdndqb2NtZGZmdHVnaHR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzYzNjUsImV4cCI6MjA5NzE1MjM2NX0.00rkvqTc0dxJr5Ga8cnwwzLumD_nWWlxlaaYZHLDOGg';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── Elementi UI ──
    const btnLogin   = document.getElementById('btn-login');
    const inpEmail   = document.getElementById('email');
    const inpPwd     = document.getElementById('password');
    const messaggio  = document.getElementById('messaggio');

    // ── Mostra messaggio ──
    function mostraMessaggio(testo, tipo) {
      messaggio.textContent = testo;
      messaggio.className = 'msg ' + tipo;
    }

    // ── Mostra eventuale messaggio salvato da app.html (es. gruppo sospeso) ──
    const msgSalvato = sessionStorage.getItem('msgLogin');
    if (msgSalvato) {
      mostraMessaggio(msgSalvato, 'errore');
      sessionStorage.removeItem('msgLogin');
    }

    // ── Se già autenticato → vai diretto a app.html ──
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session && !msgSalvato) { window.location.href = 'app.html'; }
    })();

    // ── Login ──
    btnLogin.addEventListener('click', async () => {
      const email    = inpEmail.value.trim();
      const password = inpPwd.value;

      if (!email || !password) {
        mostraMessaggio('Inserisci email e password.', 'errore');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Accesso in corso…';
      messaggio.className = 'msg';

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        mostraMessaggio('Credenziali non valide. Riprova.', 'errore');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Accedi';
        return;
      }

      /// Login riuscito — verifica che il gruppo dell'utente sia attivo
      const { data: profilo, error: errProfilo } = await db
        .from('utenti')
        .select('id, gruppi(attivo)')
        .eq('id', data.user.id)
        .single();

      if (errProfilo || !profilo || !profilo.gruppi || profilo.gruppi.attivo !== true) {
        await db.auth.signOut();
        mostraMessaggio('Il tuo gruppo è stato sospeso. Contatta l\'amministratore.', 'errore');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Accedi';
        return;
      }
      mostraMessaggio('Accesso effettuato. Caricamento…', 'info');
      window.location.href = 'app.html';
    });

    // ── Invio con tasto Enter ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnLogin.click();
    });
  </script>

</body>
</html>
